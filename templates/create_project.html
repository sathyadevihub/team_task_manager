<!DOCTYPE html>
<html>

<head>

    <title>Create Project</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#43e97b,#38f9d7);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:1px solid #43e97b;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#43e97b;
            border:none;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2ecc71;
        }

        .back-link{
            margin-top:20px;
        }

        .back-link a{
            text-decoration:none;
            color:#43e97b;
            font-weight:bold;
        }

        .back-link a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Create New Project</h2>

        <form action="/create_project" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter Project Name"
                required
            >

            <button type="submit">
                Create Project
            </button>

        </form>

        <div class="back-link">

            <br>

            <a href="/dashboard">
                Back to Dashboard
            </a>

        </div>

    </div>

</body>

</html>
