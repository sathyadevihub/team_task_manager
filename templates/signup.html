<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#ff9966,#ff5e62);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            width:380px;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border:1px solid #ff5e62;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#ff5e62;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#e53935;
        }

        .login-link{
            margin-top:20px;
        }

        .login-link a{
            text-decoration:none;
            color:#ff5e62;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Create Account</h2>

        <form action="/signup" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <select name="role" required>

                <option value="">
                    Select Role
                </option>

                <option value="Admin">
                    Admin
                </option>

                <option value="Member">
                    Member
                </option>

            </select>

            <button type="submit">
                Signup
            </button>

        </form>

        <div class="login-link">

            <p>
                Already have an account?
            </p>

            <br>

            <a href="/">
                Back to Login
            </a>

        </div>

    </div>

</body>

</html>
